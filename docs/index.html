<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV 直播源 | 自动更新</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f13;
            --card: #1a1a24;
            --border: #2a2a3a;
            --accent: #6c63ff;
            --accent2: #ff6b6b;
            --text: #e0e0e0;
            --text2: #8888aa;
            --success: #4ade80;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header .meta {
            color: var(--text2);
            font-size: 0.9rem;
        }

        .header .meta span {
            margin: 0 0.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab {
            padding: 0.6rem 1.2rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text2);
            transition: all 0.2s;
        }

        .tab:hover { border-color: var(--accent); color: var(--text); }
        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .copy-bar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-decoration: none;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.1);
        }

        .copy-btn .icon { font-size: 1.1rem; }
        .copy-btn .url {
            color: var(--text2);
            font-family: monospace;
            font-size: 0.8rem;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .search-box {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text2); }

        .category {
            margin-bottom: 2rem;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
        }

        .category-title .count {
            background: var(--accent);
            color: #fff;
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
        }

        .channels {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.6rem;
        }

        .channel {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.8rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .channel:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .channel .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .channel .copy-icon {
            opacity: 0;
            color: var(--text2);
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }

        .channel:hover .copy-icon { opacity: 1; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text2);
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .stats {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            padding: 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .num {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .label {
            color: var(--text2);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text2);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .header h1 { font-size: 1.5rem; }
            .channels { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .copy-btn .url { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 IPTV 直播源</h1>
        <div class="meta">
            <span id="update-time">加载中...</span>
            <span>|</span>
            <span id="total-count">0 个频道</span>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" data-source="all">全部</div>
            <div class="tab" data-source="ipv4">IPv4</div>
            <div class="tab" data-source="ipv6">IPv6</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="num" id="stat-total">-</div>
                <div class="label">总频道数</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-ipv4">-</div>
                <div class="label">IPv4 频道</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-ipv6">-</div>
                <div class="label">IPv6 频道</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-cats">-</div>
                <div class="label">分类</div>
            </div>
        </div>

        <div class="copy-bar">
            <a class="copy-btn" id="btn-txt" href="#" target="_blank">
                <span class="icon">📋</span>
                <span>TXT 格式</span>
                <span class="url" id="url-txt"></span>
            </a>
            <a class="copy-btn" id="btn-m3u" href="#" target="_blank">
                <span class="icon">📋</span>
                <span>M3U 格式</span>
                <span class="url" id="url-m3u"></span>
            </a>
            <button class="copy-btn" id="btn-copy-url">
                <span class="icon">🔗</span>
                <span>复制当前源链接</span>
            </button>
        </div>

        <input type="text" class="search-box" id="search" placeholder="🔍 搜索频道名称...">

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <div>正在加载频道列表...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="footer">
        <p>数据来源: GitHub 开源 IPTV 项目 | 每 6 小时自动更新</p>
        <p style="margin-top: 0.5rem;">仅供学习研究使用，请于下载后 24 小时内删除</p>
    </div>

    <script>
        const BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
        let currentSource = 'all';
        let allData = null;
        let ipv4Data = null;
        let ipv6Data = null;

        async function loadJSON(url) {
            try {
                const resp = await fetch(url + '?t=' + Date.now());
                if (!resp.ok) return null;
                return await resp.json();
            } catch (e) {
                console.error('Failed to load', url, e);
                return null;
            }
        }

        async function init() {
            [allData, ipv4Data, ipv6Data] = await Promise.all([
                loadJSON('channels.json'),
                loadJSON('channels_ipv4.json'),
                loadJSON('channels_ipv6.json')
            ]);

            if (!allData) {
                document.getElementById('content').innerHTML =
                    '<div class="loading">暂无数据，请等待首次自动更新完成后访问</div>';
                return;
            }

            // Stats
            document.getElementById('update-time').textContent = '更新于 ' + allData.updated;
            document.getElementById('total-count').textContent = allData.total + ' 个频道';
            document.getElementById('stat-total').textContent = allData.total;
            document.getElementById('stat-ipv4').textContent = ipv4Data ? ipv4Data.total : '-';
            document.getElementById('stat-ipv6').textContent = ipv6Data ? ipv6Data.total : '-';
            document.getElementById('stat-cats').textContent = Object.keys(allData.categories).length;

            // Update URLs
            updateSourceURLs();

            renderChannels(allData);
        }

        function updateSourceURLs() {
            const prefix = currentSource === 'ipv6' ? 'iptv6' : 'iptv4';
            const txtUrl = BASE_URL + prefix + '.txt';
            const m3uUrl = BASE_URL + prefix + '.m3u';

            document.getElementById('btn-txt').href = txtUrl;
            document.getElementById('url-txt').textContent = txtUrl.split('/').slice(-3).join('/');
            document.getElementById('btn-m3u').href = m3uUrl;
            document.getElementById('url-m3u').textContent = m3uUrl.split('/').slice(-3).join('/');
        }

        function renderChannels(data) {
            if (!data) {
                document.getElementById('content').innerHTML =
                    '<div class="loading">暂无数据</div>';
                return;
            }

            const search = document.getElementById('search').value.toLowerCase();
            let html = '';

            for (const [cat, channels] of Object.entries(data.categories)) {
                const filtered = search
                    ? channels.filter(c => c.name.toLowerCase().includes(search))
                    : channels;

                if (filtered.length === 0) continue;

                html += `
                    <div class="category">
                        <div class="category-title">
                            ${cat}
                            <span class="count">${filtered.length}</span>
                        </div>
                        <div class="channels">
                `;

                for (const ch of filtered) {
                    html += `
                        <div class="channel" data-url="${ch.url}" title="${ch.url}">
                            <span class="name">${ch.name}</span>
                            <span class="copy-icon">📋</span>
                        </div>
                    `;
                }

                html += '</div></div>';
            }

            if (!html) {
                html = '<div class="loading">未找到匹配的频道</div>';
            }

            document.getElementById('content').innerHTML = html;

            // Add click handlers
            document.querySelectorAll('.channel').forEach(el => {
                el.addEventListener('click', () => {
                    copyToClipboard(el.dataset.url);
                    showToast('已复制: ' + el.querySelector('.name').textContent + ' 的播放地址');
                });
            });
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSource = tab.dataset.source;

                const data = currentSource === 'ipv6' ? ipv6Data
                    : currentSource === 'ipv4' ? ipv4Data
                    : allData;

                updateSourceURLs();
                renderChannels(data);
            });
        });

        // Search
        document.getElementById('search').addEventListener('input', () => {
            const data = currentSource === 'ipv6' ? ipv6Data
                : currentSource === 'ipv4' ? ipv4Data
                : allData;
            renderChannels(data);
        });

        // Copy current source URL
        document.getElementById('btn-copy-url').addEventListener('click', () => {
            const prefix = currentSource === 'ipv6' ? 'iptv6' : 'iptv4';
            const url = BASE_URL + prefix + '.m3u';
            copyToClipboard(url);
            showToast('已复制 M3U 播放源链接');
        });

        init();
    </script>
</body>
</html>
