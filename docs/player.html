<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV 在线观看</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a12;
            --sidebar: #111120;
            --card: #16162a;
            --border: #252545;
            --accent: #6c63ff;
            --accent2: #ff6b6b;
            --text: #e8e8f0;
            --text2: #7878aa;
            --success: #4ade80;
            --hover: #1e1e3a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box {
            width: 100%;
            padding: 10px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text2); }

        /* Category tabs */
        .categories {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .categories::-webkit-scrollbar { height: 0; }
        .cat-btn {
            padding: 5px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .cat-btn:hover { border-color: var(--accent); color: var(--text); }
        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Channel list */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .channel-list::-webkit-scrollbar { width: 4px; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .channel-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }
        .channel-item:hover { background: var(--hover); }
        .channel-item.active {
            background: var(--accent);
            color: #fff;
        }
        .channel-item.active .ch-cat { color: rgba(255,255,255,0.7); }
        .ch-icon {
            width: 32px;
            height: 32px;
            background: var(--card);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .channel-item.active .ch-icon { background: rgba(255,255,255,0.2); }
        .ch-info { flex: 1; min-width: 0; }
        .ch-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ch-cat {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
        }
        .ch-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        /* Main area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* Player */
        .player-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .player-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .player-overlay.hidden { display: none; }
        .overlay-icon { font-size: 64px; margin-bottom: 16px; }
        .overlay-text { font-size: 16px; color: var(--text2); }
        .overlay-hint { font-size: 13px; color: var(--text2); margin-top: 8px; opacity: 0.6; }

        /* Now playing bar */
        .now-playing {
            padding: 12px 20px;
            background: var(--sidebar);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .np-icon { font-size: 24px; }
        .np-info { flex: 1; }
        .np-name { font-size: 14px; font-weight: 600; }
        .np-cat { font-size: 12px; color: var(--text2); }
        .np-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
        }
        .np-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Stats */
        .stats {
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* Mobile */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 16px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(108,99,255,0.4);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -320px;
                top: 0;
                bottom: 0;
                z-index: 200;
                transition: left 0.3s;
            }
            .sidebar.open { left: 0; }
            .mobile-toggle { display: flex; align-items: center; justify-content: center; }
            .sidebar-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 150;
            }
            .sidebar-backdrop.show { display: block; }
        }

        /* Error */
        .error-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 999;
            display: none;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* Loading spinner */
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar-backdrop" id="backdrop" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>📺 IPTV 直播</h1>
            <input type="text" class="search-box" id="search" placeholder="搜索频道..." autocomplete="off">
        </div>
        <div class="categories" id="categories"></div>
        <div class="stats" id="stats">加载中...</div>
        <div class="channel-list" id="channelList"></div>
    </aside>

    <main class="main">
        <div class="player-wrap" id="playerWrap">
            <video id="video" controls autoplay muted></video>
            <div class="player-overlay" id="overlay">
                <div class="overlay-icon">📺</div>
                <div class="overlay-text">选择频道开始观看</div>
                <div class="overlay-hint">点击左侧频道列表</div>
            </div>
        </div>
        <div class="now-playing" id="nowPlaying" style="display:none;">
            <div class="np-icon">📺</div>
            <div class="np-info">
                <div class="np-name" id="npName">-</div>
                <div class="np-cat" id="npCat">-</div>
            </div>
            <div class="np-status">
                <div class="np-dot"></div>
                <span>播放中</span>
            </div>
        </div>
    </main>
</div>

<button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">☰</button>
<div class="error-toast" id="errorToast"></div>

<script>
const DATA_URL = 'https://eoome.github.io/iptv-auto/channels.json';
let channels = [];
let categories = {};
let currentCat = '全部';
let hls = null;

// Load data
async function loadData() {
    try {
        const resp = await fetch(DATA_URL);
        const data = await resp.json();

        // Flatten
        for (const [cat, items] of Object.entries(data.categories)) {
            for (const ch of items) {
                channels.push({ ...ch, category: cat });
            }
            categories[cat] = items.length;
        }

        renderCategories();
        renderChannels();
        updateStats();
    } catch (e) {
        document.getElementById('stats').textContent = '❌ 加载失败，请刷新重试';
    }
}

function renderCategories() {
    const el = document.getElementById('categories');
    const total = channels.length;
    let html = `<button class="cat-btn active" data-cat="全部">全部 (${total})</button>`;
    for (const [cat, count] of Object.entries(categories)) {
        html += `<button class="cat-btn" data-cat="${cat}">${cat} (${count})</button>`;
    }
    el.innerHTML = html;
    el.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            el.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = btn.dataset.cat;
            renderChannels();
        });
    });
}

function renderChannels() {
    const el = document.getElementById('channelList');
    const query = document.getElementById('search').value.toLowerCase();
    let filtered = channels;

    if (currentCat !== '全部') {
        filtered = filtered.filter(ch => ch.category === currentCat);
    }
    if (query) {
        filtered = filtered.filter(ch => ch.name.toLowerCase().includes(query));
    }

    el.innerHTML = filtered.map((ch, i) => `
        <div class="channel-item" data-idx="${channels.indexOf(ch)}">
            <div class="ch-icon">${getCatIcon(ch.category)}</div>
            <div class="ch-info">
                <div class="ch-name">${escHtml(ch.name)}</div>
                <div class="ch-cat">${escHtml(ch.category)}</div>
            </div>
            <div class="ch-status"></div>
        </div>
    `).join('');

    el.querySelectorAll('.channel-item').forEach(item => {
        item.addEventListener('click', () => playChannel(parseInt(item.dataset.idx)));
    });

    updateStats(filtered.length);
}

function getCatIcon(cat) {
    const icons = { '央视': '🏛', '卫视': '📡', '地方': '🏙', '港澳台': '🇭🇰', '国际': '🌍', '其他': '📺' };
    return icons[cat] || '📺';
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats(count) {
    const el = document.getElementById('stats');
    const c = count !== undefined ? count : channels.length;
    el.textContent = `共 ${c} 个频道`;
}

// Play
function playChannel(idx) {
    const ch = channels[idx];
    if (!ch) return;

    // Update UI
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.channel-item[data-idx="${idx}"]`)?.classList.add('active');

    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('nowPlaying').style.display = 'flex';
    document.getElementById('npName').textContent = ch.name;
    document.getElementById('npCat').textContent = ch.category;

    // Close sidebar on mobile
    if (window.innerWidth <= 768) toggleSidebar();

    // Play
    const video = document.getElementById('video');
    const url = ch.url;

    // Destroy old HLS
    if (hls) { hls.destroy(); hls = null; }

    if (url.includes('.m3u8') || url.includes('m3u8')) {
        if (Hls.isSupported()) {
            hls = new Hls({ maxBufferLength: 10, maxMaxBufferLength: 30 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
            hls.on(Hls.Events.ERROR, (_, data) => {
                if (data.fatal) showError('播放失败，尝试下一个...');
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play().catch(()=>{});
        }
    } else {
        video.src = url;
        video.play().catch(()=>{});
    }

    // Auto next on error
    video.onerror = () => {
        showError('源失效，尝试下一个...');
        setTimeout(() => {
            const next = (idx + 1) % channels.length;
            playChannel(next);
        }, 2000);
    };
}

function showError(msg) {
    const el = document.getElementById('errorToast');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('backdrop').classList.toggle('show');
}

// Search
document.getElementById('search').addEventListener('input', renderChannels);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('search').focus();
    }
});

// Init
loadData();
</script>
</body>
</html>
